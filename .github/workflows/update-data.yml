name: Update data snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run data updaters
        run: npm run update:data

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/richest_people.json data/richest_people.json app/data/cpi_items.json data/cpi_items.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update data snapshots"
          git push